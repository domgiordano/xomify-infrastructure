name: Terraform

on:
  push:
    branches: [master]
    paths: ['terraform/**', 'lambda/**']
  pull_request:
    branches: [master]
    paths: ['terraform/**', 'lambda/**']
  workflow_dispatch:

concurrency:
  group: terraform-xomify-infrastructure
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

env:
  TF_DIR: terraform
  AWS_REGION: us-east-1

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -lock=false 2>&1 | tee /tmp/plan-output.txt
        continue-on-error: true
        env:
          TF_VAR_client_id: ${{ secrets.CLIENT_ID }}
          TF_VAR_client_secret: ${{ secrets.CLIENT_SECRET }}
          TF_VAR_api_access_token: ${{ secrets.API_ACCESS_TOKEN }}
          TF_VAR_api_secret_key: ${{ secrets.API_SECRET_KEY }}

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('/tmp/plan-output.txt', 'utf8');

            // Truncate if too long for GitHub comment (max ~65536 chars)
            const maxLength = 60000;
            if (plan.length > maxLength) {
              plan = plan.substring(0, maxLength) + '\n\n... (truncated)';
            }

            const outcome = '${{ steps.plan.outcome }}';
            const icon = outcome === 'success' ? '✅' : '❌';

            const body = `### ${icon} Terraform Plan

            <details><summary>Show Plan Output</summary>

            \`\`\`
            ${plan}
            \`\`\`

            </details>

            *Plan outcome: \`${outcome}\`*`;

            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform Plan')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Plan Status Check
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_client_id: ${{ secrets.CLIENT_ID }}
          TF_VAR_client_secret: ${{ secrets.CLIENT_SECRET }}
          TF_VAR_api_access_token: ${{ secrets.API_ACCESS_TOKEN }}
          TF_VAR_api_secret_key: ${{ secrets.API_SECRET_KEY }}
